        <div id="u1444_text" class="text ">
          <p><span style="font-family:'ArialMT', 'Arial', sans-serif;">1.</span><span style="font-family:'PingFangSC-Regular', 'PingFang SC', sans-serif;">报警中心顶部修改为标签分类，默认选择第一个</span></p><p><span style="font-family:'PingFangSC-Regular', 'PingFang SC', sans-serif;">2.新增紧急响应和设备状态两类分组，此两类分组与告警类型无关，按告警事件划分：</span></p><p><span style="font-family:'PingFangSC-Regular', 'PingFang SC', sans-serif;"><br></span></p><p><span style="font-family:'PingFangSC-Regular', 'PingFang SC', sans-serif;color:#D9001B;">紧急响应包含：</span></p><p><span style="font-family:'PingFangSC-Regular', 'PingFang SC', sans-serif;color:#D9001B;">SOS告警，语音求救，亲情号，无人，心率、呼吸超出阈值</span></p><p><span style="font-family:'PingFangSC-Regular', 'PingFang SC', sans-serif;color:#D9001B;">设备状态包含：</span></p><p><span style="font-family:'PingFangSC-Regular', 'PingFang SC', sans-serif;color:#D9001B;">故障，离线，低电量，未配置联系人，及其他未列出的告警事件</span></p><p><span style="font-family:'PingFangSC-Regular', 'PingFang SC', sans-serif;color:#D9001B;"><br></span></p><p><span style="font-family:'PingFangSC-Regular', 'PingFang SC', sans-serif;color:#000000;">3.设备状态内的告警不再弹窗，亦无需处理和填写记录信息，仅做记录展示（原报警统计，还是统计所有需要处理的报警）</span></p><p><span style="font-family:'PingFangSC-Regular', 'PingFang SC', sans-serif;"><br></span></p>
        </div>
      </div>
